<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Controle Financeiro</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

    <h1>Controle Financeiro</h1>
    
    <h2>Saldo Atual: R$ <span id="saldoAtual">0.00</span></h2>
    <hr>

    <div class="top-layout">
        <div class="historico-area">
            <h3>Histórico de Transações</h3>
            <div class="tabela-wrapper">
                <table id="tabelaTransacoes">
                    <thead>
                        <tr>
                            <th>Data</th>
                            <th>Descrição</th>
                            <th>Categoria</th>
                            <th>Tipo</th>
                            <th>Valor</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="corpoTabela">
                    </tbody>
                </table>
            </div>
        </div>

        <div class="form-area">
            <h3>Nova Transação</h3>
            <form id="formTransacao">
                <label>Descrição:</label>
                <input type="text" id="descricao" required><br><br>

                <label>Valor (R$):</label>
                <input type="number" step="0.01" id="valor" required><br><br>

                <label>Data:</label>
                <input type="date" id="data" required><br><br>

                <label>Tipo:</label>
                <select id="tipo" required>
                    <option value="RECEITA">Receita</option>
                    <option value="DESPESA">Despesa</option>
                </select><br><br>

                <label>Categoria:</label>
                <select id="categoria" required>
                    <option value="ALIMENTACAO">Alimentação</option>
                    <option value="ALUGUEL">Aluguel</option>
                    <option value="LAZER">Lazer</option>
                    <option value="OUTROS">Outros</option>
                    <option value="SALARIO">Salário</option>
                    <option value="TRANSPORTE">Transporte</option>
                </select><br><br>

                <button type="submit">Cadastrar</button>
            </form>
        </div>

        <div class="grafico-area">
            <h3>Resumo do Mês</h3>
            <div class="grafico-container">
                <div class="filtros-grafico">
                    <select id="filtroPeriodo" aria-label="Filtro de período">
                        <option value="MENSAL">Mensal</option>
                        <option value="ANUAL">Anual</option>
                    </select>
                    <select id="filtroMes" aria-label="Filtro de mês">
                        <option value="1">Janeiro</option>
                        <option value="2">Fevereiro</option>
                        <option value="3">Março</option>
                        <option value="4">Abril</option>
                        <option value="5">Maio</option>
                        <option value="6">Junho</option>
                        <option value="7">Julho</option>
                        <option value="8">Agosto</option>
                        <option value="9">Setembro</option>
                        <option value="10">Outubro</option>
                        <option value="11">Novembro</option>
                        <option value="12">Dezembro</option>
                    </select>
                    <select id="filtroAno" aria-label="Filtro de ano"></select>
                </div>
                <canvas id="meuGrafico"></canvas>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
